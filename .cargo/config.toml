# Cargo runner for WASI test/bench artifacts in this workspace.
#
# Build the runner first:
#   cargo build --release -p wasm-harness
#
# Then:
#   cargo test  -p example --target wasm32-wasip1
#   cargo bench -p example --target wasm32-wasip1
#
# An engine must be on PATH (or pointed at via $WASM_HARNESS_ENGINE).
# Either install wasmtime (https://wasmtime.dev/), or grab a JS shell:
#   npm i -g jsvu && jsvu
#
# Downstream projects should `cargo install wasm-harness` and replace the
# runner line with `runner = ["wasm-harness"]`.

[target.wasm32-wasip1]
runner = ["target/release/wasm-harness"]

[target.wasm32-wasip1-threads]
runner = ["target/release/wasm-harness"]
